
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generador de Tarjetas QR</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#FFCC00">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              dhl: {
                yellow: '#FFCC00',
                red: '#D40511',
              },
            },
          },
        },
      }
    </script>
    <style>
      .no-print { display: inline-flex !important; gap: 8px; }
      
      /* 
         IMPORTANTE: Usamos opacity: 0 y z-index negativo en lugar de display:none o left: -9999px.
         Esto asegura que el elemento tenga dimensiones reales en el viewport (width/height)
         para que qrcode.js pueda generar el canvas correctamente, y para que el navegador
         considere el contenido "visible" al invocar window.print().
      */
      .print-view {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -50; /* Detrás del contenido principal pero renderizado */
        opacity: 0;   /* Invisible al ojo pero presente para el DOM */
        pointer-events: none; /* Permite clicks a través de él */
        background: white;
        overflow: hidden;
      }

      /* ==== PRINT STYLES ==== */
      @media print {
        .no-print { display: none !important; }
        
        /* Oculta la aplicación principal */
        body > div:not(#print-root) {
          display: none !important;
        }
        
        /* Muestra el contenedor de impresión */
        .print-view {
          opacity: 1 !important;
          z-index: 9999 !important;
          position: absolute !important;
          top: 0 !important;
          left: 0 !important;
          width: 100% !important;
          height: auto !important;
          overflow: visible !important;
        }
        
        #print-root {
            display: block !important;
        }

        html, body {
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
          margin: 0;
          padding: 0;
          background: #fff;
        }

        .print-sheet {
          display: flex;
          flex-wrap: wrap;
          gap: 5mm;
          padding: 8mm;
          justify-content: flex-start;
          align-items: flex-start;
        }

        .print-card {
          background: #fff;
          color: #000;
          border: 0.2mm solid #eee;
          border-radius: 2mm;
          display: flex;
          flex-direction: column;
          justify-content: flex-start;
          align-items: center;
          page-break-inside: avoid;
          overflow: hidden;
          box-sizing: border-box;
          padding: 2mm;
        }
        
        .print-card__logo {
           width: 90%; 
           height: auto;
           max-height: 20%;
           object-fit: contain;
           margin-bottom: 2mm;
        }

        .print-card__qr-wrapper {
            margin-bottom: 2mm;
        }

        .print-card__user-id {
            font-weight: 800; /* extrabold */
            font-style: italic;
        }
        
        .print-card__user-name {
            font-weight: 700; /* bold */
            font-style: italic;
            text-transform: uppercase;
        }

        /* Tamaños de Tarjeta */
        .print-card.size-large { 
            width: 54mm; 
            height: 85mm; 
        }
        .print-card.size-small { 
            width: 34mm; 
            height: 55mm; 
        }

        /* Escalado de fuentes y QR para tamaño GRANDE */
        .print-card.size-large .print-card__qr-wrapper > div,
        .print-card.size-large .print-card__qr-wrapper canvas,
        .print-card.size-large .print-card__qr-wrapper img {
            width: 40mm !important;
            height: 40mm !important;
        }
        .print-card.size-large .print-card__user-id { font-size: 10pt; }
        .print-card.size-large .print-card__user-name { font-size: 8pt; }
        
        /* Escalado de fuentes y QR para tamaño PEQUEÑO */
         .print-card.size-small .print-card__qr-wrapper > div,
        .print-card.size-small .print-card__qr-wrapper canvas,
        .print-card.size-small .print-card__qr-wrapper img {
            width: 25mm !important;
            height: 25mm !important;
        }
        .print-card.size-small .print-card__user-id { font-size: 7pt; }
        .print-card.size-small .print-card__user-name { font-size: 6pt; }
      }
    </style>
